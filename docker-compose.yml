version: "3.9"

services:
  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: cars-client
    restart: always
    ports:
      - "3000:3000"
    depends_on:
      - server
    env_file:
      - ./client/.env
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:4000/api
      - INTERNAL_API_URL=http://cars-server:4000

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: cars-server
    restart: always
    ports:
      - "4000:4000"
    depends_on:
      - db
    env_file:
      - ./server/.env
    environment:
      - MONGODB_URI=mongodb://root:1234@db:27017/cars?authSource=admin
      - STORAGE_PATH=/server/storage
    volumes:
      - /var/www/cars/storage:/server/storage
  db:
    image: mongo:7
    container_name: cars-mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 1234
    volumes:
      - mongo_data:/data/db

volumes:
  mongo_data:
